<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

.box h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #1e3c72;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.switch {
    margin-top: 15px;
}

.switch span {
    color: #1e3c72;
    cursor: pointer;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="box">
    <h2>إنشاء حساب</h2>

    <input type="text" id="name" placeholder="الاسم">
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button onclick="register()">إنشاء</button>

    <p class="switch">
        عندك حساب؟
        <span onclick="goLogin()">تسجيل الدخول</span>
    </p>

    <p id="registerError" style="color:red;"></p>
</div>

<script src="script.js"></script>

</body>
</html>
